name: PR workflow

on:
  pull_request:

jobs:
  ci-sst-install:
    name: SST Install
    uses: ./.github/workflows/ci-sst-install.yml
    secrets: inherit

  ci-build-library:
    name: Build DRRA Library
    uses: ./.github/workflows/ci-build-library.yml
    needs: ci-sst-install
    secrets: inherit

  ci-run-tests:
    name: Run DRRA Tests
    uses: ./.github/workflows/ci-run-tests.yml
    needs: ci-build-library
    secrets: inherit
