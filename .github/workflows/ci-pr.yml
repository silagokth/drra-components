name: PR workflow

on:
  pull_request:

jobs:
  ci-sst-install:
    name: SST Install
    uses: ./.github/workflows/ci-sst-install.yml
    secrets: inherit

  ci-build-library-sst-off:
    name: Build DRRA Library without SST
    uses: ./.github/workflows/ci-build-library-sst-off.yml
    secrets: inherit

  ci-build-library:
    name: Build DRRA Library
    uses: ./.github/workflows/ci-build-library.yml
    needs: ci-sst-install
    secrets: inherit

  ci-run-tests:
    name: Run DRRA Tests
    uses: ./.github/workflows/ci-run-tests.yml
    needs: ci-build-library
    secrets: inherit
    with:
      branch: ${{ needs.ci-build-library.outputs.branch }}

  # Tier A: open-tool synthesizability lint (Verible + slang) on the assembled
  # fabric. No PDK, GitHub-hosted, runs on every PR. Cheap complement to the
  # gated Genus gate. See ci-synth-lint.yml / docs/SYNTH_LINT.md.
  ci-synth-lint:
    name: Synthesizability lint
    uses: ./.github/workflows/ci-synth-lint.yml
    needs: ci-build-library
    secrets: inherit
