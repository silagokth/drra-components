name: Install and cache SST

on:
  workflow_dispatch

env:
  SST_CORE_HOME: ~/.sst
  SST_ELEMENTS_HOM: ~/.sst

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: jwlawson/actions-setup-cmake@v2
    - uses: actions/cache@v4
      with: 
        path: $SST_CORE_HOME
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev  libtool libtool-bin autoconf automake
    - name: Install SST Core
      run: |
        wget https://github.com/sstsimulator/sst-core/releases/download/v14.1.0_Final/sstcore-14.1.0.tar.gz -O sstcore-14.1.0.tar.gz
        tar -xzf sstcore-14.1.0.tar.gz
        cd sstcore-14.1.0
        ./configure --prefix=$SST_CORE_HOME && make && make install
        export PATH=$SST_CORE_HOME/bin:$PATH
        cd ..
    - name: Install SST Elements
      run: |
        wget https://github.com/sstsimulator/sst-elements/releases/download/v14.1.0_Final/sstelements-14.1.0.tar.gz -O sstelements-14.1.0.tar.gz
        tar -xzf sstelements-14.1.0.tar.gz
        cd sstelements-14.1.0
        for folder in `ls -d ./src/sst/elements/*/`; do touch $folder/.ignore; done && rm -rf src/sst/elements/memHierarchy/.ignore
        ./autogen.sh
        ./configure --prefix=$SST_ELEMENTS_HOME && make && make install
        export PATH=$SST_ELEMENTS_HOME/bin:$PATH
        cd ..
    - name: Clean temp files
      run: |
        rm -rf sstcore-14.1.0.tar.gz sstcore-14.1.0 sstelements-14.1.0.tar.gz sstelements-14.1.0
    - name: Build library
      uses: ./.github/workflows/build_library.yml
    - name: Build testcases
      uses: ./.github/workflows/build_testcases.yml